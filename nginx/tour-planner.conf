# ─────────────────────────────────────────────────────────────
# Tur Planlayıcı — Nginx reverse proxy (production)
#
# Routes:
#   /        -> frontend (Next.js)        on 127.0.0.1:3000
#   /api     -> backend  (Go / Fiber)     on 127.0.0.1:8080
#
# The /api/telegram/webhook path is just a normal /api route — it is proxied to
# the backend by the /api block below. For TELEGRAM_MODE=webhook this MUST be
# publicly reachable over HTTPS (Telegram only calls https:// webhooks on ports
# 443/80/88/8443). After SSL is set up (see README "SSL with Certbot"), register
# the webhook with:
#   curl -F "url=https://your-domain.com/api/telegram/webhook" \
#        "https://api.telegram.org/bot<TELEGRAM_BOT_TOKEN>/setWebhook"
#
# Usage:
#   1. Replace your-domain.com below with your real domain.
#   2. Copy to /etc/nginx/sites-available/tour-planner.conf
#   3. ln -s /etc/nginx/sites-available/tour-planner.conf /etc/nginx/sites-enabled/
#   4. nginx -t && systemctl reload nginx
#   5. Run `certbot --nginx -d your-domain.com` to add the TLS server block.
# ─────────────────────────────────────────────────────────────

server {
    listen 80;
    listen [::]:80;
    server_name your-domain.com;

    # Certbot writes ACME HTTP-01 challenges here; keep it before any redirect.
    location /.well-known/acme-challenge/ {
        root /var/www/html;
    }

    # After running certbot --nginx, Certbot adds the 443 server block and
    # rewrites this to redirect HTTP -> HTTPS automatically. Until then this
    # block serves the app directly.

    # Reasonable upload size for photos/documents forwarded to the bot/AI.
    client_max_body_size 25m;

    # ---- Backend API (includes the Telegram webhook) ----
    # Note: the trailing slashes are intentionally OMITTED so the /api prefix
    # is preserved and forwarded to the backend exactly as received.
    location /api {
        proxy_pass http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }

    # ---- Frontend (Next.js) ----
    location / {
        proxy_pass http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Upgrade           $http_upgrade;
        proxy_set_header Connection        "upgrade";
        proxy_read_timeout 60s;
    }
}
