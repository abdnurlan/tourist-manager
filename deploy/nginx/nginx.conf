# ─────────────────────────────────────────────────────────────
# Tur Planlayıcı — Nginx əsas konfiqurasiyası (production)
# ─────────────────────────────────────────────────────────────
user  nginx;
worker_processes  auto;
error_log  /var/log/nginx/error.log warn;
pid        /var/run/nginx.pid;

events {
    worker_connections  1024;
    multi_accept on;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;

    # ---- Loglar ----
    log_format main '$remote_addr - $remote_user [$time_local] "$request" '
                    '$status $body_bytes_sent "$http_referer" '
                    '"$http_user_agent" rt=$request_time';
    access_log /var/log/nginx/access.log main;

    # ---- Performans ----
    sendfile        on;
    tcp_nopush      on;
    tcp_nodelay     on;
    keepalive_timeout  65;
    server_tokens   off;           # Nginx versiyasını gizlət
    client_max_body_size 25m;      # Foto/sənəd yükləmələri üçün

    # ---- Gzip sıxılma ----
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_min_length 1024;
    gzip_types
        application/javascript
        application/json
        application/xml
        application/rss+xml
        font/woff2
        image/svg+xml
        text/css
        text/javascript
        text/plain
        text/xml;

    # ---- Rate limiting zonaları ----
    # API üçün ümumi limit + login üçün daha sərt limit (brute-force qarşısı).
    limit_req_zone $binary_remote_addr zone=api_limit:10m rate=20r/s;
    limit_req_zone $binary_remote_addr zone=login_limit:10m rate=5r/m;
    limit_req_status 429;

    # ---- Upstream-lər (daxili docker şəbəkəsi) ----
    upstream backend_upstream {
        server backend:8080;
        keepalive 32;
    }
    upstream frontend_upstream {
        server frontend:3000;
        keepalive 32;
    }
    upstream landing_upstream {
        server frontend-landing:3001;
        keepalive 32;
    }

    include /etc/nginx/conf.d/*.conf;
}
