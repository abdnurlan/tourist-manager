# ─────────────────────────────────────────────────────────────
# Tur Planlayıcı — tour.m4strip.com server blokları
#
#   /                      -> frontend (Next.js)   frontend:3000
#   /api                   -> backend  (Go/Fiber)  backend:8080
#   /api/auth/login        -> sərt rate limit (brute-force qarşısı)
#   /api/telegram/webhook  -> backend (Telegram HTTPS webhook)
#   /.well-known/...       -> Certbot ACME challenge
# ─────────────────────────────────────────────────────────────

# ---- HTTP (80): ACME challenge + HTTPS-ə yönləndirmə ----
server {
    listen 80;
    listen [::]:80;
    server_name tour.m4strip.com;

    # Let's Encrypt HTTP-01 challenge — yönləndirmədən ƏVVƏL olmalıdır.
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    # Qalan bütün trafik HTTPS-ə.
    location / {
        return 301 https://$host$request_uri;
    }
}

# ---- HTTPS (443): əsas tətbiq ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name tour.m4strip.com;

    # ---- TLS sertifikatları (Certbot idarə edir) ----
    ssl_certificate     /etc/letsencrypt/live/tour.m4strip.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/tour.m4strip.com/privkey.pem;
    ssl_trusted_certificate /etc/letsencrypt/live/tour.m4strip.com/chain.pem;

    # ---- Müasir TLS parametrləri ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;
    resolver 1.1.1.1 8.8.8.8 valid=300s;
    resolver_timeout 5s;

    # ---- Təhlükəsizlik header-ləri ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    client_max_body_size 25m;

    # ---- Telegram webhook (sərt deyil — Telegram-ın IP-ləri dəyişir) ----
    location = /api/telegram/webhook {
        proxy_pass http://backend_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ---- Login: sərt rate limit (brute-force qarşısı) ----
    location = /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://backend_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ---- Backend API ----
    location /api {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://backend_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ---- Next.js statik aktivləri (uzunmüddətli keş) ----
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
        proxy_cache_valid 200 60m;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ---- Frontend (Next.js) ----
    location / {
        proxy_pass http://frontend_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
