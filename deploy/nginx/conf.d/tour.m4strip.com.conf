# ─────────────────────────────────────────────────────────────
# Tur Planlayıcı — tour.m4strip.com (Cloudflare proxy ON + Origin Cert)
#
#   Brauzer ─HTTPS─> Cloudflare ─HTTPS(Full Strict)─> bu nginx (origin)
#
#   /                      -> frontend (Next.js)   frontend:3000
#   /api                   -> backend  (Go/Fiber)  backend:8080
#   /api/auth/login        -> sərt rate limit (brute-force qarşısı)
#   /api/telegram/webhook  -> backend (Telegram HTTPS webhook)
#
# Sertifikat: Cloudflare Origin Certificate (15 il, renewal yox).
# Real ziyarətçi IP-si conf.d/cloudflare-realip.conf-da bərpa olunur.
# ─────────────────────────────────────────────────────────────

# ---- HTTP (80): yalnız HTTPS-ə yönləndirmə ----
# (Cloudflare Full Strict origin-ə 443 ilə qoşulur; 80 demək olar istifadə
#  olunmur, amma birbaşa giriş üçün təhlükəsiz yönləndirmə saxlanır.)
server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name tour.m4strip.com;
    return 301 https://$host$request_uri;
}

# ---- HTTPS (443): əsas tətbiq (Cloudflare Origin Certificate) ----
server {
    listen 443 ssl default_server;
    listen [::]:443 ssl default_server;
    http2 on;
    server_name tour.m4strip.com;

    # ---- Cloudflare Origin Certificate ----
    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    # ---- Müasir TLS (origin <-> Cloudflare) ----
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;
    # Qeyd: Origin Cert OCSP stapling dəstəkləmir — ona görə stapling yoxdur.

    # ---- (İstəyə bağlı) Authenticated Origin Pulls (mTLS) ----
    # Yalnız Cloudflare-in qoşulmasına icazə vermək üçün CF panelindən
    # "Authenticated Origin Pulls" aç və aşağıdakı 3 sətri şərhdən çıxar:
    # ssl_client_certificate /etc/nginx/ssl/cloudflare-origin-pull-ca.pem;
    # ssl_verify_client on;

    # ---- Təhlükəsizlik header-ləri ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Permissions-Policy "camera=(), microphone=(self), geolocation=()" always;

    client_max_body_size 25m;

    # ---- Telegram webhook ----
    location = /api/telegram/webhook {
        proxy_pass http://backend_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ---- Login: sərt rate limit (brute-force qarşısı) ----
    location = /api/auth/login {
        limit_req zone=login_limit burst=5 nodelay;
        proxy_pass http://backend_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ---- Backend API ----
    location /api {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://backend_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ---- Yüklənən şəkillər (backend statik verir) ----
    location /uploads/ {
        proxy_pass http://backend_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ---- Next.js statik aktivləri (uzunmüddətli keş) ----
    location /_next/static/ {
        proxy_pass http://frontend_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ---- Frontend (Next.js) ----
    location / {
        proxy_pass http://frontend_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
