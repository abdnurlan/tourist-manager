# ─────────────────────────────────────────────────────────────
# M4STrip — m4strip.com (public İvrit-fokuslu landing sayt)
#
#   Brauzer ─HTTPS─> Cloudflare ─HTTPS(Full Strict)─> bu nginx (origin)
#
#   /            -> frontend-landing (TanStack Start SSR)  frontend-landing:3001
#   /api         -> backend (Go/Fiber)                      backend:8080
#   /uploads/    -> backend (statik şəkillər)
#
# tour.m4strip.com admin panelini göstərir; m4strip.com yalnız landing-dir.
# (default_server tour.m4strip.com-dadır — bura ayrıca server_name ilə gəlir.)
# ─────────────────────────────────────────────────────────────

# ---- HTTP (80): HTTPS-ə yönləndir ----
server {
    listen 80;
    listen [::]:80;
    server_name m4strip.com www.m4strip.com;
    return 301 https://m4strip.com$request_uri;
}

# ---- www → apex (kanonik host) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name www.m4strip.com;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;

    return 301 https://m4strip.com$request_uri;
}

# ---- HTTPS (443): landing (Cloudflare Origin Certificate) ----
server {
    listen 443 ssl;
    listen [::]:443 ssl;
    http2 on;
    server_name m4strip.com;

    ssl_certificate     /etc/nginx/ssl/origin.pem;
    ssl_certificate_key /etc/nginx/ssl/origin.key;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_prefer_server_ciphers off;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-ECDSA-CHACHA20-POLY1305:ECDHE-RSA-CHACHA20-POLY1305;
    ssl_session_timeout 1d;
    ssl_session_cache shared:SSL:10m;
    ssl_session_tickets off;

    # ---- Təhlükəsizlik header-ləri ----
    add_header Strict-Transport-Security "max-age=63072000; includeSubDomains; preload" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-XSS-Protection "1; mode=block" always;

    client_max_body_size 25m;

    # ---- Booking API (public) ----
    location /api {
        limit_req zone=api_limit burst=40 nodelay;
        proxy_pass http://backend_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
    }

    # ---- Yüklənən şəkillər (backend statik verir) ----
    location /uploads/ {
        proxy_pass http://backend_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ---- Landing statik aktivləri (hash-lı, uzunmüddətli keş) ----
    location /assets/ {
        proxy_pass http://landing_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # ---- Landing (TanStack Start SSR) ----
    location / {
        proxy_pass http://landing_upstream;
        include /etc/nginx/conf.d/proxy_params.conf;
    }
}
