# Air — Go canlı yenilənmə (hot reload) konfiqurasiyası.
# Fayl dəyişdikdə yalnız dəyişən hissə yenidən qurulur və server avtomatik restart olunur.
root = "."
tmp_dir = "tmp"

[build]
  cmd = "go build -o ./tmp/main ./cmd/server"
  bin = "./tmp/main"
  full_bin = "./tmp/main"
  include_ext = ["go", "tpl", "tmpl", "html", "sql"]
  exclude_dir = ["tmp", "migrations", "vendor"]
  delay = 500
  stop_on_error = true
  kill_delay = "2s"
  send_interrupt = true

[log]
  time = true

[misc]
  clean_on_exit = true
