# ─────────────────────────────────────────────────────────────
# Tur Planlayıcı — PRODUCTION orchestration (tour.m4strip.com)
#
# Təhlükəsizlik prinsipi: yalnız nginx xaricə 80/443 açır.
# db / backend / frontend yalnız daxili "turnet" şəbəkəsindədir —
# host-da heç bir port açmırlar (internetdən birbaşa əlçatan deyillər).
#
# İstifadə (Cloudflare proxy ON + Origin Certificate):
#   cp .env.production.example .env            &&  nano .env
#   bash deploy/scripts/setup-origin-cert.sh   # CF Origin Cert-i yerləşdir
#   bash deploy/scripts/deploy.sh              # build + up
# ─────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: turplanlayici_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - turnet
    # Host-a port AÇILMIR — yalnız daxili şəbəkədən əlçatandır.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: turplanlayici/backend:latest
    container_name: turplanlayici_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_MODE: ${TELEGRAM_MODE}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USER_ID: ${TELEGRAM_ALLOWED_USER_ID}
      # Yüklənən şəkillər: qovluq (volume) + mütləq URL üçün public origin.
      UPLOAD_DIR: /data/uploads
      PUBLIC_BASE_URL: ${PUBLIC_BASE_URL}
    volumes:
      # Yüklənən şəkillər — konteyner yenidən qurulanda da qalsın.
      - uploads:/data/uploads
    networks:
      - turnet
    # Host-a port AÇILMIR — nginx daxili şəbəkədən proxy edir.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_API_URL build zamanı brauzer bundle-na yazılır.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: turplanlayici/frontend:latest
    container_name: turplanlayici_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    networks:
      - turnet
    # Host-a port AÇILMIR — nginx daxili şəbəkədən proxy edir.

  frontend-landing:
    build:
      context: ./frontend-landing
      dockerfile: Dockerfile
      args:
        # Browser bundle calls the public API on the landing domain.
        VITE_API_URL: ${LANDING_API_URL:-https://m4strip.com/api}
    image: turplanlayici/frontend-landing:latest
    container_name: turplanlayici_frontend_landing
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      # SSR route loaders run inside the container — reach backend by service name.
      SSR_API_URL: http://backend:8080/api
      PORT: "3001"
    networks:
      - turnet
    # Host-a port AÇILMIR — nginx daxili şəbəkədən proxy edir.

  nginx:
    image: nginx:1.27-alpine
    container_name: turplanlayici_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - frontend-landing
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      # Cloudflare Origin Certificate (origin.pem + origin.key) — git-ignored.
      - ./deploy/nginx/ssl:/etc/nginx/ssl:ro
    networks:
      - turnet

volumes:
  pgdata:
    driver: local
  uploads:
    driver: local

networks:
  turnet:
    driver: bridge
