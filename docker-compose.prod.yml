# ─────────────────────────────────────────────────────────────
# Tur Planlayıcı — PRODUCTION orchestration (tour.m4strip.com)
#
# Təhlükəsizlik prinsipi: yalnız nginx xaricə 80/443 açır.
# db / backend / frontend yalnız daxili "turnet" şəbəkəsindədir —
# host-da heç bir port açmırlar (internetdən birbaşa əlçatan deyillər).
#
# İstifadə:
#   cp .env.production.example .env   &&  nano .env
#   bash deploy/scripts/init-ssl.sh   # ilk dəfə: TLS sertifikatı
#   bash deploy/scripts/deploy.sh     # build + up
# ─────────────────────────────────────────────────────────────

services:
  db:
    image: postgres:16-alpine
    container_name: turplanlayici_db
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER} -d ${POSTGRES_DB}"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 15s
    networks:
      - turnet
    # Host-a port AÇILMIR — yalnız daxili şəbəkədən əlçatandır.

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    image: turplanlayici/backend:latest
    container_name: turplanlayici_backend
    restart: unless-stopped
    depends_on:
      db:
        condition: service_healthy
    environment:
      PORT: "8080"
      DATABASE_URL: postgres://${POSTGRES_USER}:${POSTGRES_PASSWORD}@db:5432/${POSTGRES_DB}?sslmode=disable
      CORS_ORIGINS: ${CORS_ORIGINS}
      JWT_SECRET: ${JWT_SECRET}
      ADMIN_USERNAME: ${ADMIN_USERNAME}
      ADMIN_PASSWORD: ${ADMIN_PASSWORD}
      OPENAI_API_KEY: ${OPENAI_API_KEY}
      TELEGRAM_MODE: ${TELEGRAM_MODE}
      TELEGRAM_BOT_TOKEN: ${TELEGRAM_BOT_TOKEN}
      TELEGRAM_ALLOWED_USER_ID: ${TELEGRAM_ALLOWED_USER_ID}
    networks:
      - turnet
    # Host-a port AÇILMIR — nginx daxili şəbəkədən proxy edir.

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        # NEXT_PUBLIC_API_URL build zamanı brauzer bundle-na yazılır.
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    image: turplanlayici/frontend:latest
    container_name: turplanlayici_frontend
    restart: unless-stopped
    depends_on:
      - backend
    environment:
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL}
    networks:
      - turnet
    # Host-a port AÇILMIR — nginx daxili şəbəkədən proxy edir.

  nginx:
    image: nginx:1.27-alpine
    container_name: turplanlayici_nginx
    restart: unless-stopped
    depends_on:
      - frontend
      - backend
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/nginx/conf.d:/etc/nginx/conf.d:ro
      - ./deploy/nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - certbot_www:/var/www/certbot:ro
      - certbot_conf:/etc/letsencrypt:ro
    # Sertifikat yeniləndikdə nginx-i 6 saatdan bir reload edir.
    command: >-
      /bin/sh -c "while :; do sleep 6h & wait $${!}; nginx -s reload; done & nginx -g 'daemon off;'"
    networks:
      - turnet

  certbot:
    image: certbot/certbot:latest
    container_name: turplanlayici_certbot
    restart: unless-stopped
    volumes:
      - certbot_www:/var/www/certbot:rw
      - certbot_conf:/etc/letsencrypt:rw
    # 12 saatdan bir sertifikatı yeniləməyə cəhd edir (Let's Encrypt tövsiyəsi).
    entrypoint: >-
      /bin/sh -c "trap exit TERM; while :; do certbot renew --webroot -w /var/www/certbot --quiet; sleep 12h & wait $${!}; done"

volumes:
  pgdata:
    driver: local
  certbot_www:
    driver: local
  certbot_conf:
    driver: local

networks:
  turnet:
    driver: bridge
